stages:
  - build
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

build:
  stage: build
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -e .
    - clarity --help
  artifacts:
    paths:
      - clarity_engine.egg-info/
    expire_in: 1 hour

test:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --upgrade pip
    - pip install -e .
    - python -m behave features/ --no-capture
